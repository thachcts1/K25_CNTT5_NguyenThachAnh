<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        const player = {
            name: "De Bruyne",
            position: "Midfielder",
            goals: 8,
            assists: 25,
            matchesPlayed: 35
        };
        const performanceScore = (player) => {
            const performance = (player.goals + player.assists) / player.matchesPlayed;
            player.performancePerMatch = +performance.toFixed(2);

            player.isKeyPlayer = player.performancePerMatch >= 1.0;
            console.log(player);
        }
        performanceScore(player);

    </script>
</body>

</html>
