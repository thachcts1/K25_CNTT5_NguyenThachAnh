<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        const players = [
            { name: "Messi", position: "Forward", age: 36, goals: 25, assists: 15, matches: 34, yellowCards: 2 },
            { name: "Ronaldo", position: "Forward", age: 39, goals: 30, assists: 10, matches: 38, yellowCards: 4 },
            { name: "Neymar", position: "Forward", age: 32, goals: 18, assists: 20, matches: 32, yellowCards: 3 },
            { name: "De Bruyne", position: "Midfielder", age: 33, goals: 8, assists: 25, matches: 35, yellowCards: 1 },
            { name: "Kante", position: "Midfielder", age: 33, goals: 2, assists: 5, matches: 36, yellowCards: 0 },
            { name: "Van Dijk", position: "Defender", age: 33, goals: 5, assists: 3, matches: 33, yellowCards: 2 },
            { name: "Alisson", position: "Goalkeeper", age: 31, goals: 0, assists: 1, matches: 37, yellowCards: 0 }
        ];
        const generateRankingReport = (minMatches, players) => {
            const filtered = players.filter(players => players.matches >= minMatches);

            if (filtered.length === 0) {
                console.log("Không có cầu thủ nào đủ điều kiện");
                return;
            }
            const updated = filtered.map(players => {

                const performanceScore = +((players.goals + players.assists) / players.matches).toFixed(2);
                const efficiencyScore = +(performanceScore - (players.yellowCards / players.matches) * 10).toFixed(2);
                return {
                    ...players,
                    performanceScore,
                    efficiencyScore
                };
            });

            updated.sort((index, value) => {
                if (value.efficiencyScore !== index.efficiencyScore) {
                    return value.efficiencyScore - index.efficiencyScore;
                }

                if (value.performanceScore !== index.performanceScore) {
                    return value.performanceScore - index.performanceScore;
                }

                return value.goals - index.goals;
            });

            console.log(`XẾP HẠNG (từ ${minMatches} trận trở lên)`);

            updated.forEach((player, index) => {
                console.log(
                    `${index + 1}. ${player.name} - Efficiency: ${player.efficiencyScore} | Performance: ${player.performanceScore} | Goals: ${player.goals}`
                );
            });

            console.log("Tổng số cầu thủ:", updated.length);
            console.log("Cầu thủ xuất sắc nhất:", updated[0].name);

            const top3 = updated.slice(0, 3);
            const avg =
                +(top3.reduce((sum, player) => sum + player.efficiencyScore, 0) / top3.length).toFixed(2);

            console.log("Trung bình efficiency top 3:", avg);
        };
        console.log("Bảng xếp hạng cầu thủ:");
        generateRankingReport(30, players);
    </script>
</body>

</html>
