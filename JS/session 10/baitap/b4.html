<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        const players = [
            { name: "Messi", years: 18, salary: 100 },
            { name: "Ronaldo", years: 20, salary: 95 },
            { name: "Neymar", years: 12, salary: 90 },
            { name: "Mbappe", years: 7, salary: 85 },
            { name: "Haaland", years: 5, salary: 80 },
            { name: "Modric", years: 22, salary: 70 },
            { name: "Benzema", years: 19, salary: 75 }
        ];

        const analyzePlayerSalaries = (minYears, playersList) => {

            const filteredPlayers =
                playersList.filter(player => player.years >= minYears);

            if (filteredPlayers.length === 0) {
                return {
                    totalSalary: 0,
                    highestPaidPlayer: null,
                    lowestPaidPlayer: null
                };
            }

            const totalSalary =
                filteredPlayers.reduce((sum, player) => sum + player.salary, 0);

            const highestPaidPlayer =
                filteredPlayers.reduce((max, player) =>
                    player.salary > max.salary ? player : max
                );

            const lowestPaidPlayer =
                filteredPlayers.reduce((min, player) =>
                    player.salary < min.salary ? player : min
                );

            return {
                totalSalary,
                highestPaidPlayer,
                lowestPaidPlayer
            };
        };
    </script>
</body>

</html>
