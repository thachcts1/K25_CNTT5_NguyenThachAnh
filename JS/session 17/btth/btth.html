<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <header>
        <h1>🧧 CHỢ TẾT ONLINE 🧧</h1>
        <p>Sắm sửa đón xuân - Rinh lộc về nhà</p>
    </header>

    <div class="container">
        <!-- Cột trái: Danh sách sản phẩm -->
        <div class="left-col">
            <h2>Gian Hàng Tết</h2>
            <div id="product-list" class="grid-container">
                <!-- Javascript sẽ render sản phẩm vào đây -->
            <!-- xoá hết-->
            </div>
        </div>

        <!-- Cột phải: Giỏ hàng -->
        <div class="right-col">
            <div class="cart-box">
                <h2>🛒 Giỏ Hàng Của Bạn</h2>

                <!-- Danh sách các món đã mua -->
                <ul id="cart-list">
                    <li class="empty-msg">Chưa có món nào...</li>
                    <li>
                        <span class="cart-item-name">Bánh Chưng Tranh Khúc</span>
                        <div>
                            <span class="cart-item-price">150.000</span>
                            <button class="btn-remove">X</button>
                        </div>
                    </li>
                    <li>
                        <span class="cart-item-name">Dưa Hấu Khắc Chữ</span>
                        <div>
                            <span class="cart-item-price">60.000</span>
                            <button class="btn-remove">X</button>
                        </div>
                    </li>
                </ul>

                <div class="cart-summary">
                    <p>Tổng cộng:</p>
                    <h3 id="total-price">210.000đ</h3>
                    <button id="btn-checkout" class="btn-checkout"
                        onclick="alert('Cảm ơn bạn đã mua hàng! Chúc mừng năm mới!')">Thanh Toán</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Nhúng Javascript -->
    <script src="./btth.js"></script>
</body>

</html>
