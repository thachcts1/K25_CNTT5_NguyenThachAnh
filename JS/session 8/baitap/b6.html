<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        const players = [
            "Messi - Forward - 25 - 15 - 34",
            "Ronaldo - Forward - 30 - 10 - 38",
            "Neymar - Forward - 18 - 20 - 32",
            "De Bruyne - Midfielder - 8 - 25 - 35",
            "Kante - Midfielder - 2 - 5 - 36",
            "Van Dijk - Defender - 5 - 3 - 33",
            "Alisson - Goalkeeper - 0 - 1 - 37"
        ];

        function reportByPosition(players) {
            const positions = ["Forward", "Midfielder", "Defender", "Goalkeeper"];
            console.log("BÁO CÁO HIỆU SUẤT THEO VỊ TRÍ");
            positions.forEach(pos => {
                let count = 0;
                let totalGoals = 0;
                let totalAssists = 0;
                let totalMatches = 0;

                players.forEach(p => {
                    const parts = p.split(" - ");
                    if (parts[1] === pos) {
                        count++;
                        totalGoals += Number(parts[2]);
                        totalAssists += Number(parts[3]);
                        totalMatches += Number(parts[4]);
                    }
                });
                if (count > 0) {
                    const avg = (totalGoals + totalAssists) / totalMatches;
                    console.log(pos + ":");
                    console.log("- Số cầu thủ: " + count);
                    console.log("- Tổng bàn thắng: " + totalGoals);
                    console.log("- Tổng kiến tạo: " + totalAssists);
                    console.log("- Tổng số trận: " + totalMatches);
                    console.log("- Trung bình hiệu suất/trận: " + avg.toFixed(2));
                    console.log("");
                }

            });
            let totalGoals = 0;
            players.forEach(p => {
                totalGoals += Number(p.split(" - ")[2]);
            });
            console.log("----------------------");
            console.log("Tổng bàn thắng toàn đội: " + totalGoals);
        }
        console.log(reportByPosition(players));
    </script>
</body>

</html>
