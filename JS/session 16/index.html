<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <title>Quản Lý Nhân Viên</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <div class="container">
    <header class="header">
      <h1 id="form-title">Thêm Nhân Viên Mới</h1>
    </header>

    <section class="form-section">
      <form id="employee-form" novalidate>
        <div class="form-grid">
          <div class="form-group">
            <label for="fullName">Họ và tên <span class="required">*</span></label>
            <input type="text" id="fullName" name="fullName" placeholder="Nhập họ và tên" />
            <small class="error" id="error-fullName"></small>
          </div>

          <div class="form-group">
            <label for="email">Email <span class="required">*</span></label>
            <input type="email" id="email" name="email" placeholder="vd: ten@gmail.com" />
            <small class="error" id="error-email"></small>
          </div>

          <div class="form-group">
            <label for="dateOfBirth">Ngày sinh <span class="required">*</span></label>
            <input type="date" id="dateOfBirth" name="dateOfBirth" />
            <small class="error" id="error-dateOfBirth"></small>
          </div>

          <div class="form-group">
            <label for="position">Chức vụ <span class="required">*</span></label>
            <select id="position" name="position">
              <option value="">-- Chọn chức vụ --</option>
              <option value="Nhân viên">Nhân viên</option>
              <option value="Trưởng nhóm">Trưởng nhóm</option>
              <option value="Trưởng phòng">Trưởng phòng</option>
              <option value="Giám đốc">Giám đốc</option>
            </select>
            <small class="error" id="error-position"></small>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" id="submit-btn" class="btn btn-primary">Thêm Nhân Viên</button>
          <button type="submit" id="submit-update" class="btn btn-primary hidden">Cập nhật</button>
          <button type="button" id="cancel-edit-btn" class="btn btn-secondary hidden">Hủy</button>
        </div>
      </form>
    </section>

    <section class="table-section">
      <div class="table-header">
        <h2>Danh Sách Nhân Viên</h2>
        <span class="badge" id="employee-count">0 nhân viên</span>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Họ và tên</th>
              <th>Email</th>
              <th>Ngày sinh</th>
              <th>Chức vụ</th>
              <th>Hành động</th>
            </tr>
          </thead>
          <tbody id="employee-tbody">
            <!-- Dynamic rows -->
          </tbody>
        </table>
      </div>
    </section>

    <footer class="footer">
      <span id="footer-count">Tổng số nhân viên: 0</span>
    </footer>
  </div>

  <script src="./script.js"></script>
</body>

</html>
